<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login & Daftar - Sistem Absensi Teaching Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a4a6f, #2c7a4d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 40px 32px;
            transition: transform 0.2s;
        }
        .auth-container:hover { transform: translateY(-4px); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo i { font-size: 48px; color: #2c7a4d; background: #eef2f8; padding: 16px; border-radius: 60px; }
        h1 { font-size: 28px; font-weight: 700; text-align: center; color: #1f2937; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 32px; }
        .tabs { display: flex; gap: 16px; margin-bottom: 28px; border-bottom: 2px solid #e5e7eb; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-weight: 600; cursor: pointer; color: #6b7280; transition: 0.2s; border-bottom: 3px solid transparent; }
        .tab.active { color: #2c7a4d; border-bottom-color: #2c7a4d; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 500; font-size: 14px; margin-bottom: 8px; color: #374151; }
        .input-group { display: flex; align-items: center; border: 1px solid #e5e7eb; border-radius: 16px; padding: 12px 16px; transition: all 0.2s; background: #f9fafb; }
        .input-group i { color: #9ca3af; margin-right: 12px; font-size: 18px; }
        .input-group input { border: none; background: transparent; width: 100%; font-size: 15px; outline: none; font-family: inherit; }
        .input-group:focus-within { border-color: #2c7a4d; box-shadow: 0 0 0 3px rgba(44,122,77,0.1); background: white; }
        button { width: 100%; background: #2c7a4d; color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #1e5e3a; transform: translateY(-1px); }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 16px; font-size: 13px; margin-top: 16px; display: none; text-align: center; }
        .loading { display: none; text-align: center; margin-top: 16px; font-size: 13px; color: #2c7a4d; }
        .footer-note { margin-top: 32px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; padding-top: 20px; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="logo"><i class="fas fa-chalkboard-user"></i></div>
    <h1>Absensi Teaching Factory</h1>
    <div class="subtitle">Sistem manajemen blok</div>
    <div class="tabs">
        <div class="tab active" data-tab="login">Masuk</div>
        <div class="tab" data-tab="register">Daftar Orang Tua</div>
    </div>
    <form id="loginForm" style="display: block;">
        <div class="form-group">
            <label>Email</label>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="contoh@email.com" required autocomplete="email"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password"></div>
        </div>
        <button type="submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    </form>
    <form id="registerForm" style="display: none;">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <div class="input-group"><i class="fas fa-user"></i><input type="text" id="registerNama" placeholder="Nama orang tua" required></div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="registerEmail" placeholder="email@example.com" required autocomplete="email"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="registerPassword" placeholder="Minimal 6 karakter" required autocomplete="new-password"></div>
        </div>
        <div class="form-group">
            <label>Konfirmasi Password</label>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="registerConfirmPassword" placeholder="Ulangi password" required></div>
        </div>
        <button type="submit" id="registerBtn"><i class="fas fa-user-plus"></i> Daftar</button>
    </form>
    <div id="errorMessage" class="error-message"></div>
    <div id="loadingIndicator" class="loading"><i class="fas fa-spinner fa-spin"></i> Memproses...</div>
    <div class="footer-note"><i class="fas fa-shield-alt"></i> Sistem aman menggunakan Firebase</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDKR4e_9uHBhBqQEdxR7s2R807fawb7J8Y",
        authDomain: "absensi-toi.firebaseapp.com",
        projectId: "absensi-toi",
        storageBucket: "absensi-toi.firebasestorage.app",
        messagingSenderId: "1069310497322",
        appId: "1:1069310497322:web:2705d66e041c41a1626953"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabs = document.querySelectorAll('.tab');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const errorDiv = document.getElementById('errorMessage');
    const loadingDiv = document.getElementById('loadingIndicator');

    function showError(message) {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function setLoading(loading) {
        if (loading) {
            loginBtn.disabled = true;
            registerBtn.disabled = true;
            loadingDiv.style.display = 'block';
        } else {
            loginBtn.disabled = false;
            registerBtn.disabled = false;
            loadingDiv.style.display = 'none';
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (target === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
            errorDiv.style.display = 'none';
        });
    });

    async function redirectUserByRole(user) {
        try {
            // Cek email admin spesifik
            if (user.email === "teknikotomasiindustri.nepan@gmail.com") {
                window.location.href = 'dashboard_admin.html';
                return;
            }
            // Cek role dari Firestore
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const role = userDoc.data().role;
                if (role === 'guru') {
                    window.location.href = 'dashboard_guru.html';
                } else if (role === 'orangtua') {
                    window.location.href = 'orangtua/dashboard.html';
                } else {
                    await auth.signOut();
                    showError('Role tidak dikenali. Hubungi admin.');
                }
            } else {
                await auth.signOut();
                showError('Akun tidak terdaftar di sistem. Hubungi admin.');
            }
        } catch (error) {
            console.error(error);
            showError('Gagal memuat data pengguna.');
            await auth.signOut();
        }
    }

    // LOGIN
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showError('Email dan password harus diisi.'); return; }
        setLoading(true);
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            await redirectUserByRole(userCredential.user);
        } catch (error) {
            let message = 'Login gagal. Periksa email dan password.';
            if (error.code === 'auth/user-not-found') message = 'Email tidak terdaftar.';
            else if (error.code === 'auth/wrong-password') message = 'Password salah.';
            else if (error.code === 'auth/invalid-email') message = 'Format email tidak valid.';
            showError(message);
        } finally { setLoading(false); }
    });

    // REGISTER ORANG TUA
    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const nama = document.getElementById('registerNama').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirmPassword').value;
        if (!nama || !email || !password) { showError('Semua field harus diisi.'); return; }
        if (password !== confirm) { showError('Password dan konfirmasi tidak cocok.'); return; }
        if (password.length < 6) { showError('Password minimal 6 karakter.'); return; }
        setLoading(true);
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            await setDoc(doc(db, "users", user.uid), {
                nama: nama,
                email: email,
                role: 'orangtua',
                createdAt: new Date().toISOString()
            });
            await setDoc(doc(db, "orangtua", user.uid), {
                nama: nama,
                email: email,
                userId: user.uid
            });
            alert('Pendaftaran berhasil! Anda akan diarahkan ke dashboard orang tua.');
            window.location.href = 'orangtua/dashboard.html';
        } catch (error) {
            let message = 'Gagal mendaftar. ';
            if (error.code === 'auth/email-already-in-use') message = 'Email sudah terdaftar.';
            else message += error.message;
            showError(message);
        } finally { setLoading(false); }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await redirectUserByRole(user);
        }
    });
</script>
</body>
</html>
